<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore - E-commerce</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background-color: #f8f9fa;
      color: #333;
    }

    header {
      background-color: #1a1a1a;
      color: #fff;
      padding: 20px;
      text-align: center;
      margin-bottom: 40px;
    }

    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      width: 90%;
      max-width: 1200px;
      margin: 0 auto 60px;
    }

    .card {
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1; /* Faz o conteúdo esticar para empurrar o botão pro final */
    }

    .categoria {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #6c757d;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-info h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: #1a1a1a;
      flex-grow: 1;
    }

    .preco {
      font-size: 1.4rem;
      font-weight: bold;
      color: #28a745; /* Verde de dinheiro */
      margin-bottom: 10px;
    }

    .estoque {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 15px;
    }

    .sem-estoque {
      color: #dc3545; /* Vermelho para chamar atenção */
      font-weight: bold;
    }

    .btn-comprar {
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    .btn-comprar:hover {
      background-color: #0056b3;
    }

    .btn-comprar:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <header>
    <h1>TechStore</h1>
  </header>

  <main class="grid-produtos">
    </main>

  <script src="scripts.js"></script>
</body>
</html>
