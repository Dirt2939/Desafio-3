<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Filmes</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #141414;
        color: #e5e5e5;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 40px 0;
      }

      .lista {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin: 0 auto;
        width: 90%;
        max-width: 1200px;
      }

      .card {
        background-color: #1f1f1f;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        flex-direction: column;
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.6);
      }

      .card img {
        cursor: pointer;
        width: 100%;
        height: 350px;
        object-fit: cover;
        display: block;
        border-bottom: 3px solid #e50914;
      }

      .card h3 {
        font-size: 1.3rem;
        margin: 15px 15px 5px;
        color: #ffffff;
      }

      .card .desc {
        font-size: 0.9rem;
        color: #a3a3a3;
        margin: 0 15px 15px;
        line-height: 1.5;
        flex-grow: 1;
      }

      .card p:not(.desc):not(.genero) {
        margin: 0 15px 10px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #f5c518;
      }

      .card .genero {
        display: inline-block;
        background-color: #333333;
        color: #ffffff;
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 20px;
        margin: 0 15px 20px;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <div class="lista"></div>
    <script src="scripts.js"></script>
  </body>
</html>
